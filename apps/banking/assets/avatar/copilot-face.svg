<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- ear pods -->
  <rect x="0" y="47" width="13" height="32" rx="6.5" fill="#14756a"/>
  <rect x="3" y="54" width="7" height="18" rx="3.5" fill="#5fc0b4"/>
  <rect x="107" y="47" width="13" height="32" rx="6.5" fill="#14756a"/>
  <rect x="110" y="54" width="7" height="18" rx="3.5" fill="#5fc0b4"/>

  <!-- head shell -->
  <ellipse cx="60" cy="62" rx="54" ry="50" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
  <!-- teal cap: solid across the top of the helmet -->
  <path d="M8 52 C13 -2 107 -2 112 52 C85 37 35 37 8 52 Z" fill="#14756a"/>
  <!-- forehead logo -->
  <circle cx="60" cy="21" r="9.5" fill="#ee7a23"/>
  <circle cx="60" cy="17.2" r="2" fill="#ffffff"/>
  <rect x="58.2" y="19.8" width="3.6" height="7.4" rx="1.8" fill="#ffffff"/>

  <!-- visor -->
  <rect x="20" y="36" width="80" height="62" rx="28" fill="#16302c"/>
  <!-- eyebrows -->
  <path d="M34 55 Q43 48 52 55" stroke="#4a6a63" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M68 55 Q77 48 86 55" stroke="#4a6a63" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <g>
    <ellipse cx="43" cy="71" rx="10.5" ry="12" fill="#ffffff"/>
    <circle cx="43" cy="72" r="7.2" fill="#2ba193"/>
    <circle cx="43" cy="72" r="3.6" fill="#0e1f1c"/>
    <circle cx="45.8" cy="68" r="2" fill="#ffffff"/>
    <circle cx="39.8" cy="74.8" r="1" fill="#ffffff"/>
  </g>
  <g>
    <ellipse cx="77" cy="71" rx="10.5" ry="12" fill="#ffffff"/>
    <circle cx="77" cy="72" r="7.2" fill="#2ba193"/>
    <circle cx="77" cy="72" r="3.6" fill="#0e1f1c"/>
    <circle cx="79.8" cy="68" r="2" fill="#ffffff"/>
    <circle cx="73.8" cy="74.8" r="1" fill="#ffffff"/>
  </g>
  <!-- smile -->
  <path d="M47 86 Q60 96 73 86" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
