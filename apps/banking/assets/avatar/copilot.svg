<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320">
  <!-- ground shadow -->
  <ellipse cx="120" cy="313" rx="54" ry="6" fill="#d8e2df" opacity="0.6"/>

  <!-- waving arm (drawn first so the head overlaps the joint) -->
  <g>
    <!-- upper arm + forearm -->
    <path d="M86 160 C74 150 66 142 64 130" stroke="#d7e3e0" stroke-width="17" fill="none" stroke-linecap="round"/>
    <path d="M86 160 C74 150 66 142 64 130" stroke="#ffffff" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M64 128 C58 116 52 104 50 94" stroke="#d7e3e0" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M64 128 C58 116 52 104 50 94" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- open waving palm -->
    <g>
      <rect x="30" y="58" width="6.5" height="24" rx="3.25" fill="#ffffff" stroke="#d7e3e0" stroke-width="1.6"/>
      <rect x="38.5" y="52" width="6.5" height="30" rx="3.25" fill="#ffffff" stroke="#d7e3e0" stroke-width="1.6"/>
      <rect x="47" y="50" width="6.5" height="32" rx="3.25" fill="#ffffff" stroke="#d7e3e0" stroke-width="1.6"/>
      <rect x="55.5" y="56" width="6.5" height="26" rx="3.25" fill="#ffffff" stroke="#d7e3e0" stroke-width="1.6"/>
      <ellipse cx="47" cy="88" rx="14" ry="12" fill="#ffffff" stroke="#d7e3e0" stroke-width="2"/>
      <rect x="57" y="80" width="14" height="7" rx="3.5" fill="#ffffff" stroke="#d7e3e0" stroke-width="1.6" transform="rotate(28 64 83.5)"/>
    </g>
  </g>

  <!-- ear pods -->
  <rect x="42" y="78" width="15" height="36" rx="7.5" fill="#14756a"/>
  <rect x="45.5" y="86" width="8" height="20" rx="4" fill="#5fc0b4"/>
  <rect x="183" y="78" width="15" height="36" rx="7.5" fill="#14756a"/>
  <rect x="186.5" y="86" width="8" height="20" rx="4" fill="#5fc0b4"/>

  <!-- head shell -->
  <ellipse cx="120" cy="94" rx="63" ry="58" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
  <!-- teal cap: solid across the top of the helmet -->
  <path d="M57 84 C58 22 182 22 183 84 C150 64 90 64 57 84 Z" fill="#14756a"/>
  <!-- forehead logo -->
  <circle cx="120" cy="46" r="11" fill="#ee7a23"/>
  <circle cx="120" cy="41.5" r="2.4" fill="#ffffff"/>
  <rect x="117.9" y="44.6" width="4.2" height="8.6" rx="2.1" fill="#ffffff"/>

  <!-- visor -->
  <rect x="73" y="64" width="94" height="72" rx="32" fill="#16302c"/>
  <!-- eyebrows -->
  <path d="M90 86 Q100 79 110 86" stroke="#4a6a63" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M130 86 Q140 79 150 86" stroke="#4a6a63" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <g>
    <ellipse cx="100" cy="104" rx="11.5" ry="13" fill="#ffffff"/>
    <circle cx="100" cy="105" r="8" fill="#2ba193"/>
    <circle cx="100" cy="105" r="4" fill="#0e1f1c"/>
    <circle cx="103" cy="100.5" r="2.2" fill="#ffffff"/>
    <circle cx="96.5" cy="108" r="1.1" fill="#ffffff"/>
  </g>
  <g>
    <ellipse cx="140" cy="104" rx="11.5" ry="13" fill="#ffffff"/>
    <circle cx="140" cy="105" r="8" fill="#2ba193"/>
    <circle cx="140" cy="105" r="4" fill="#0e1f1c"/>
    <circle cx="143" cy="100.5" r="2.2" fill="#ffffff"/>
    <circle cx="136.5" cy="108" r="1.1" fill="#ffffff"/>
  </g>
  <!-- smile -->
  <path d="M105 121 Q120 132 135 121" stroke="#ffffff" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- neck -->
  <rect x="109" y="149" width="22" height="12" rx="5" fill="#cfdeda"/>

  <!-- torso -->
  <path d="M80 176 Q80 156 100 156 L140 156 Q160 156 160 176 L158 208 Q156 232 120 232 Q84 232 82 208 Z" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
  <!-- waist band -->
  <path d="M83 208 Q120 224 157 208 L156 218 Q120 236 84 218 Z" fill="#14756a"/>
  <!-- chest button -->
  <circle cx="120" cy="186" r="15" fill="#14756a"/>
  <circle cx="120" cy="186" r="8" fill="#ee7a23"/>

  <!-- resting arm -->
  <path d="M158 166 C168 176 172 190 172 204" stroke="#d7e3e0" stroke-width="17" fill="none" stroke-linecap="round"/>
  <path d="M158 166 C168 176 172 190 172 204" stroke="#ffffff" stroke-width="13" fill="none" stroke-linecap="round"/>
  <circle cx="172" cy="206" r="7" fill="#14756a"/>
  <path d="M172 208 C173 218 173 224 171 230" stroke="#d7e3e0" stroke-width="15" fill="none" stroke-linecap="round"/>
  <path d="M172 208 C173 218 173 224 171 230" stroke="#ffffff" stroke-width="11" fill="none" stroke-linecap="round"/>
  <ellipse cx="170" cy="236" rx="9.5" ry="10" fill="#ffffff" stroke="#d7e3e0" stroke-width="2"/>

  <!-- legs -->
  <g>
    <rect x="92" y="228" width="23" height="36" rx="11.5" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
    <circle cx="103.5" cy="266" r="7.5" fill="#14756a"/>
    <rect x="95" y="266" width="17" height="28" rx="8.5" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
    <path d="M85 306 Q85 290 102 290 Q118 290 118 304 L118 308 Q118 312 112 312 L91 312 Q85 312 85 306 Z" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
    <rect x="85" y="306" width="33" height="7" rx="3.5" fill="#14756a"/>
  </g>
  <g>
    <rect x="125" y="228" width="23" height="36" rx="11.5" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
    <circle cx="136.5" cy="266" r="7.5" fill="#14756a"/>
    <rect x="128" y="266" width="17" height="28" rx="8.5" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
    <path d="M122 304 Q122 290 138 290 Q155 290 155 306 Q155 312 149 312 L128 312 Q122 312 122 308 Z" fill="#ffffff" stroke="#d7e3e0" stroke-width="2.5"/>
    <rect x="122" y="306" width="33" height="7" rx="3.5" fill="#14756a"/>
  </g>
</svg>
